<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Deal Hub - Townsville Radar</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0e15">
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff0055;
            --bg-dark: #0a0b10;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark); overflow: hidden; color: #fff;
        }
        
        /* THE MAIN APP CANVAS (Dynamically shifts based on button selection) */
        #app-canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            background: radial-gradient(circle at 50% 50%, #141724 0%, #050609 100%);
        }

        /* 1. STATE DEFAULT: ABSTRACT FUTURISTIC CYBERPUNK DNA CANVAS */
        .bg-dna {
            background-image: 
                radial-gradient(var(--neon-cyan) 1px, transparent 0), 
                radial-gradient(var(--neon-magenta) 1px, transparent 0);
            background-size: 40px 40px; background-position: 0 0, 20px 20px;
            opacity: 0.15; animation: dnaHelix 20s linear infinite;
        }
        @keyframes dnaHelix {
            0% { background-position: 0 0, 20px 20px; transform: scale(1); }
            50% { transform: scale(1.1) rotate(2deg); }
            100% { background-position: 40px 80px, 60px 100px; transform: scale(1); }
        }

        /* 2. STATE FOOD: CONVEYOR MATRIX / NEON PACKAGING STREAM */
        .bg-food {
            background: linear-gradient(90deg, rgba(255,0,85,0.05) 1px, transparent 1px), linear-gradient(0deg, rgba(255,0,85,0.05) 1px, transparent 1px);
            background-size: 20px 20px; animation: conveyor 4s linear infinite;
        }
        @keyframes conveyor { 0% { background-position: 0 0; } 100% { background-position: 0 40px; } }

        /* 3. STATE TECH: FLOATING BINARY DIGITAL CIRCUITS */
        .bg-tech {
            background: radial-gradient(rgba(0, 243, 255, 0.1) 15%, transparent 20%), radial-gradient(rgba(0, 243, 255, 0.05) 15%, transparent 20%);
            background-size: 60px 60px; background-position: 0 0, 30px 30px; animation: circuits 8s ease infinite;
        }
        @keyframes circuits { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }

        /* 4. STATE TRAVEL: AIRPORT VECTOR HUD RADAR TARGETS */
        .bg-travel {
            background: repeating-radial-gradient(circle, rgba(0,243,255,0.02), rgba(0,243,255,0.02) 20px, transparent 20px, transparent 40px);
            animation: radarSweep 10s linear infinite;
        }
        @keyframes radarSweep { 0% { transform: scale(0.9); } 100% { transform: scale(1.2); } }

        /* 5. STATE VEHICLES: THE CYBER COCKPIT */
        .bg-vehicles {
            background: 
                linear-gradient(180deg, rgba(10,11,16,0.9) 0%, rgba(20,23,36,0.4) 50%, rgba(5,6,9,0.95) 80%),
                repeating-linear-gradient(0deg, rgba(0,243,255,0.03) 0px, rgba(0,243,255,0.03) 2px, transparent 2px, transparent 4px);
        }
        .hud-wheel {
            position: absolute; bottom: -100px; left: calc(50% - 150px); width: 300px; height: 300px;
            border: 12px solid rgba(0, 243, 255, 0.15); border-radius: 50%; opacity: 0;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1); transform: rotate(0deg); transition: opacity 0.5s;
        }
        .hud-shifter {
            position: absolute; bottom: 20px; right: 40px; width: 14px; height: 120px;
            background: linear-gradient(to top, rgba(255,0,85,0.4), var(--neon-magenta));
            border-radius: 10px; opacity: 0; transition: opacity 0.5s; transform-origin: bottom center;
        }
        .bg-vehicles .hud-wheel { opacity: 1; animation: steerDrive 6s ease-in-out infinite; }
        .bg-vehicles .hud-shifter { opacity: 1; animation: shiftGear 4s ease-in-out infinite; }
        @keyframes steerDrive { 0%, 100% { transform: rotate(0deg); } 30% { transform: rotate(15deg); } 70% { transform: rotate(-12deg); } }
        @keyframes shiftGear { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(-10deg); } }

        /* 6. STATE WILDCARD: GLITCH MATRIX WALL */
        .bg-wildcard {
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%; animation: staticNoise 0.2s infinite;
        }
        @keyframes staticNoise { 0% { background-position: 0 0; } 100% { background-position: 5px 5px; } }

        /* FOREGROUND UI CONTAINER */
        .ui-wrapper {
            position: relative; z-index: 10; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-sizing: border-box; padding: 20px; overflow-y: auto;
        }
        .app-card {
            width: 100%; max-width: 440px; background: rgba(13, 15, 24, 0.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px;
            padding: 24px; box-sizing: border-box;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        
        /* NEW TOWNSVILLE INTEGRATED COMPONENTS */
        .radar-panel {
            border: 1px dashed var(--neon-cyan); border-radius: 12px;
            padding: 12px; margin-bottom: 20px; background: rgba(0, 243, 255, 0.02);
        }
        .radar-title { color: var(--neon-cyan); font-size: 12px; font-weight: 800; letter-spacing: 1px; margin: 0 0 8px 0; }
        .alert-stream { font-size: 13px; color: #8a99ad; }
        .essential-box {
            background: rgba(255, 255, 255, 0.02); border-radius: 12px;
            padding: 12px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05);
        }
        
        h1 { margin: 0 0 5px 0; text-align: center; font-size: 26px; font-weight: 800; letter-spacing: -0.5px; color: #fff; }
        .subtitle { text-align: center; color: #8a99ad; font-size: 12px; margin-bottom: 20px; }
        .btn-stack { display: flex; flex-direction: column; gap: 12px; }
