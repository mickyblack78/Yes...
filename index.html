<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GW4D20 MASTER MONITOR</title>
    <style>
        :root { --bg: #010101; --accent: #00f2ff; --danger: #f00; --panel: #111; }
        body { background: var(--bg); color: #fff; font-family: monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 10px; background: #000; border-bottom: 2px solid #333; display: flex; justify-content: space-between; font-size: 13px; }
        
        /* Fixed Gauge Layout to stop "Box Review" */
        #gauge-grid { flex: 0 0 40%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .gauge-card { 
            background: var(--panel); 
            border: 2px solid #222; 
            border-radius: 50%; /* Force Circularity */
            aspect-ratio: 1 / 1;
            position: relative; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
        }
        canvas { width: 90%; height: 90%; }
        .v-val { position: absolute; top: 45%; font-size: 24px; font-weight: bold; color: var(--accent); transform: translateY(-50%); }
        .v-label { position: absolute; bottom: 15%; font-size: 10px; color: #888; }

        #console { flex: 1; background: #000; margin: 5px 10px; border: 1px solid #333; padding: 10px; font-size: 11px; overflow-y: auto; color: #0f0; border-left: 4px solid var(--accent); }
        
        /* 70px Bottom Buffer for Android Navigation */
        #controls-container { padding: 5px 10px 70px 10px; background: #080808; border-top: 1px solid #222; }
        .controls-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        
        button { padding: 14px 2px; border: 1px solid #444; border-radius: 4px; font-size: 10px; font-weight: bold; color: #fff; background: #222; }
        button:active { background: var(--accent); color: #000; }
        .btn-blue { border-color: var(--accent); color: var(--accent); }
        .btn-red { border-color: var(--danger); color: var(--danger); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <div id="status">● STANDBY</div>
    <div id="pg-name">SENSORS [P1]</div>
</header>

<div id="gauge-grid">
    <div class="gauge-card"><canvas id="g1"></canvas><div class="v-val" id="v1">0</div><div class="v-label" id="l1">RPM</div></div>
    <div class="gauge-card"><canvas id="g2"></canvas><div class="v-val" id="v2">0</div><div class="v-label" id="l2">TEMP</div></div>
    <div class="gauge-card"><canvas id="g3"></canvas><div class="v-val" id="v3">0</div><div class="v-label" id="l3">BOOST</div></div>
    <div class="gauge-card"><canvas id="g4"></canvas><div class="v-val" id="v4">0</div><div class="v-label" id="l4">SPEED</div></div>
</div>

<div id="console">SHELL LOADED. LOGIC READY.</div>

<div id="controls-container">
    <div id="ctrl-p1" class="controls-grid">
        <button class="btn-blue" onclick="core.connect()">CONNECT ALL</button>
        <button onclick="core.nextSensors()">NEXT SENSORS</button>
        <button id="pause-btn" class="btn-red" onclick="core.toggleLive()">STOP LIVE</button>
        
        <button onclick="core.sendUDS([0x19, 0x02, 0x08])">READ FAULTS</button>
        <button onclick="core.sendUDS([0x14, 0xFF, 0xFF, 0xFF])">CLEAR FAULTS</button>
        <button style="color:#ffd700; border-color:#ffd700;" onclick="core.exportLog()">EXPORT LOG</button>
        
        <button class="btn-red" onclick="core.disconnect()">DISCONNECT</button>
        <button style="visibility:hidden"></button>
        <button class="btn-blue" onclick="core.toggleCtrl(2)">NEXT TOOLS &gt;</button>
    </div>

    <div id="ctrl-p2" class="controls-grid hidden">
        <button onclick="document.getElementById('console').innerHTML=''">CLS SCREEN</button>
        <button onclick="core.manualHex()">CUSTOM HEX</button>
        <button onclick="core.sendUDS([0x11, 0x01])">ECU RESET</button>
        
        <button onclick="location.reload()">RELOAD APP</button>
        <button style="visibility:hidden"></button>
        <button style="visibility:hidden"></button>
        
        <button style="visibility:hidden"></button>
        <button style="visibility:hidden"></button>
        <button class="btn-blue" onclick="core.toggleCtrl(1)">&lt; BACK MAIN</button>
    </div>
</div>
  <script>
const core = {
    port: null, writer: null, reader: null, isRunning: false, isLive: true,
    activeSensors: 1, logStr: "",
    
    // 90% Logic Depth: Formula Table
    map: {
        1: [
            { n: "RPM", d: [0xF4, 0x0C], u: "", m: 6000, p: b => Math.round(((b[0]*256)+b[1])/4) },
            { n: "TEMP", d: [0xF4, 0x05], u: "°C", m: 120, p: b => b[0]-40 },
            { n: "BOOST", d: [0xF4, 0x0B], u: " Bar", m: 2.5, p: b => (((b[0]*256)+b[1])/100).toFixed(2) },
            { n: "SPEED", d: [0xF4, 0x0D], u: " kmh", m: 220, p: b => b[0] }
        ],
        2: [
            { n: "BATTERY", d: [0xF4, 0x42], u: "V", m: 16, p: b => (((b[0]*256)+b[1])/1000).toFixed(1) },
            { n: "LOAD", d: [0xF4, 0x04], u: "%", m: 100, p: b => Math.round(b[0]*100/255) },
            { n: "IAT", d: [0xF4, 0x0F], u: "°C", m: 100, p: b => b[0]-40 },
            { n: "FUEL", d: [0xF4, 0x23], u: " kPa", m: 180000, p: b => ((b[0]*256)+b[1])*10 }
        ]
    },

    log: (msg, force = false) => {
        const c = document.getElementById('console');
        const entry = `[${new Date().toLocaleTimeString().split(' ')[0]}] ${msg}`;
        core.logStr += entry + "\n"; // Always log for Export Log
        if (core.isLive || force) {
            const d = document.createElement('div');
            d.textContent = entry;
            c.appendChild(d);
            c.scrollTop = c.scrollHeight;
            if (c.childElementCount > 200) c.removeChild(c.firstChild);
        }
    },

    connect: async () => {
        try {
            core.port = await navigator.serial.requestPort();
            await core.port.open({ baudRate: 115200 });
            core.writer = core.port.writable.getWriter();
            core.reader = core.port.readable.getReader();
            document.getElementById('status').innerText = "● ONLINE";
            document.getElementById('status').style.color = core.accent;
            core.log("PORT OPEN. STARTING HANDSHAKE...", true);
            
            // HANDSHAKE: Extended Session + Security
            await core.sendUDS([0x10, 0x03]);
            await new Promise(r => setTimeout(r, 200));
            await core.sendUDS([0x27, 0x01]);
            
            core.isRunning = true;
            core.readLoop(); core.pollLoop();
        } catch (e) { core.log("ERR: " + e.message, true); }
    },

    sendUDS: async (bytes) => {
        if (!core.writer) return;
        await core.writer.write(new Uint8Array(bytes));
        core.log("TX: " + Array.from(bytes).map(b => b.toString(16).toUpperCase().padStart(2, '0')).join(' '));
    },

    readLoop: async () => {
        while (core.isRunning) {
            const { value, done } = await core.reader.read();
            if (done) break;
            const hex = Array.from(value).map(b => b.toString(16).toUpperCase().padStart(2, '0')).join(' ');
            core.log("RX: " + hex);
            if (value[0] === 0x62) core.parse(value.slice(3));
        }
    },

    pollLoop: async () => {
        while (core.isRunning) {
            for (let s of core.map[core.activeSensors]) {
                if (!core.isRunning) break;
                await core.sendUDS([0x22, ...s.d]);
                await new Promise(r => setTimeout(r, 160)); // 160ms cycle
            }
        }
    },

    parse: (data) => {
        core.map[core.activeSensors].forEach((s, i) => {
            const val = s.p(data);
            document.getElementById(`v${i+1}`).innerText = val + s.u;
            core.draw(i + 1, val, s.m);
        });
    },

    draw: (idx, v, m) => {
        const c = document.getElementById(`g${idx}`);
        const ctx = c.getContext('2d');
        const centerX = 100, centerY = 100, radius = 80;
        ctx.clearRect(0,0,200,200);
        // Background track
        ctx.beginPath(); ctx.arc(centerX, centerY, radius, 0.8 * Math.PI, 2.2 * Math.PI);
        ctx.strokeStyle = "#222"; ctx.lineWidth = 15; ctx.stroke();
        // Active value
        ctx.beginPath();
        const end = 0.8 * Math.PI + (Math.min(v, m) / m) * (1.4 * Math.PI);
        ctx.arc(centerX, centerY, radius, 0.8 * Math.PI, end);
        ctx.strokeStyle = "#00f2ff"; ctx.lineWidth = 15; ctx.stroke();
    },

    nextSensors: () => {
        core.activeSensors = core.activeSensors === 2 ? 1 : 2;
        document.getElementById('pg-name').innerText = `SENSORS [P${core.activeSensors}]`;
        core.map[core.activeSensors].forEach((s, i) => document.getElementById(`l${i+1}`).innerText = s.n);
    },

    toggleLive: () => {
        core.isLive = !core.isLive;
        const btn = document.getElementById('pause-btn');
        btn.innerText = core.isLive ? "STOP LIVE" : "RESUME LIVE";
        btn.classList.toggle('paused-mode', !core.isLive);
        core.log(core.isLive ? "--- LIVE DATA RESUMED ---" : "--- LIVE DATA STOPPED ---", true);
    },

    toggleCtrl: (pg) => {
        document.getElementById('ctrl-p1').classList.toggle('hidden', pg === 2);
        document.getElementById('ctrl-p2').classList.toggle('hidden', pg === 1);
    },

    exportLog: () => {
        const blob = new Blob([core.logStr], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `GW4D20_DUMP_${Date.now()}.txt`;
        a.click();
        core.log("LOG EXPORTED.", true);
    },

    manualHex: () => {
        const h = prompt("HEX BYTES (e.g. 22 F4 0C)");
        if (h) core.sendUDS(h.split(' ').map(x => parseInt(x, 16)));
    },

    disconnect: () => { core.isRunning = false; location.reload(); }
};

// Init Canvas Resolution
document.querySelectorAll('canvas').forEach(c => { c.width = 200; c.height = 200; });
              </script>
  

</body>
</html>
